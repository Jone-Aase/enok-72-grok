<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enoch 72 - Norge-fork (based on v16.77) - EXPERIMENT</title>
  <style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
  }

  /* ============ SHELL ============ */
  #shell { display: flex; flex-direction: column; height: 100vh; }

  /* Titlebar */
  #titlebar {
    background: #141414; height: 32px; display: flex; align-items: center;
    padding: 0 12px; border-bottom: 1px solid #2a2a2a;
    font-size: 11px; color: #aaa; user-select: none;
  }
  #titlebar .dots { display: flex; gap: 6px; margin-right: 12px; }
  #titlebar .dot { width: 11px; height: 11px; border-radius: 50%; }
  #titlebar .dot.r { background: #ff5f56; }
  #titlebar .dot.y { background: #ffbd2e; }
  #titlebar .dot.g { background: #27c93f; }
  #titlebar .title { flex: 1; text-align: center; font-weight: 500; color: #c9a247; letter-spacing: 0.04em; }
  #titlebar .subtitle { color: #777; }

  /* Toolbar */
  #toolbar {
    background: #181818; height: 46px; display: flex; align-items: center;
    padding: 0 10px; gap: 8px; border-bottom: 1px solid #2a2a2a;
  }
  .nav-btn {
    background: transparent; border: 1px solid transparent; color: #ccc;
    min-width: 32px; width: auto; height: 30px; border-radius: 4px; cursor: pointer;
    padding: 0 6px;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: #2a2a2a; }
  #urlbar {
    flex: 1; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 6px;
    height: 32px; padding: 0 12px; color: #cde;
    font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 12px;
  }
  #urlbar:focus { outline: none; border-color: #4a6a8a; }
  .toolbar-btn {
    background: #2a3a4a; color: #fff; border: none; padding: 6px 12px;
    border-radius: 4px; cursor: pointer; font-size: 11px; height: 30px;
    white-space: nowrap;
  }
  .toolbar-btn:hover { background: #3a5a7a; }
  .toolbar-btn.primary { background: #4a6a8a; }
  .toolbar-btn.gold { background: #806020; color: #fff; }
  .toolbar-btn.gold:hover { background: #a07a30; }

  /* "Vis i kalender"-knapp i bevis-arkivet */
  .goto-cal-btn {
    background: #1f2a1a; color: #a8d090; border: 1px solid #2da356;
    padding: 4px 8px; border-radius: 3px; cursor: pointer;
    font-size: 10px; font-weight: 500; letter-spacing: 0.02em;
    white-space: nowrap; transition: background 0.15s;
  }
  .goto-cal-btn:hover { background: #2da356; color: #fff; }

  /* Mode switcher */
  .mode-group { display: flex; gap: 0; background: #0d0d0d; border-radius: 4px; padding: 2px; }
  .mode-btn {
    background: transparent; border: none; color: #888; padding: 6px 12px;
    cursor: pointer; font-size: 11px; height: 26px; border-radius: 3px;
  }
  .mode-btn.active { background: #c9a247; color: #000; font-weight: 600; }
  .mode-btn:hover:not(.active) { color: #fff; }

  /* Timeline bar */
  #timeline-bar {
    background: #0e0e0e; height: 40px; display: flex; align-items: center;
    padding: 0 12px; gap: 12px; border-bottom: 1px solid #2a2a2a;
    font-family: ui-monospace, monospace; font-size: 11px;
  }
  #timeline-bar .tl-label { color: #888; min-width: 70px; }
  #timeline-bar input[type=range] { flex: 1; max-width: 300px; }
  #timeline-bar .tl-val { color: #c9a247; min-width: 60px; }
  .preset-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; color: #ccc;
    padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 10px;
  }
  .preset-btn:hover { background: #2a2a2a; color: #fff; }
  .preset-btn.active { background: #c9a247; color: #000; border-color: #c9a247; }

  /* Calendar window - movable and resizable */
  #calbar {
    /* v16.27: top flyttet fra 56px til 110px slik at calbar ikke dekker timeline-bar (Play-knappen) */
    /* v16.42: display:none som default - aapnes via Calendar-knappen */
    position: fixed; left: 50%; top: 110px;
    transform: translateX(-50%);
    width: min(1200px, calc(100vw - 40px));
    min-width: 600px; min-height: 56px;
    max-width: calc(100vw - 20px); max-height: 80vh;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(6px);
    height: auto; display: none; align-items: center;
    padding: 10px 50px 10px 40px; gap: 14px;
    border: 1px solid #2a2a2a; border-radius: 6px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    font-family: ui-monospace, monospace; font-size: 14px;
    flex-wrap: wrap; overflow: hidden;
    z-index: 50; resize: both;
  }
  #calbar-handle {
    position: absolute; left: 0; top: 0; bottom: 0; width: 32px;
    cursor: grab; background: linear-gradient(180deg, #1a1208 0%, #0a0a0a 100%);
    display: flex; align-items: center; justify-content: center;
    color: #c9a247; font-size: 16px; border-right: 1px solid #2a2a2a;
    border-radius: 6px 0 0 6px; user-select: none;
  }
  #calbar-handle:active { cursor: grabbing; }
  #calbar-close {
    position: absolute; right: 8px; top: 8px;
    width: 24px; height: 24px; border-radius: 3px;
    background: #1a1a1a; color: #c9a247; border: 1px solid #333;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px; padding: 0;
  }
  #calbar-close:hover { background: #2a2a2a; }
  /* v16.46: Calendar-knapp fast i ovre hoyre, justert til top:90px sa den ligger under toolbar (toolbar bunn=78px, ikke 46px pga embedding) */
  #btn-show-calbar {
    position: fixed; right: 14px; top: 90px; z-index: 49;
    background: #1a1208; color: #c9a247; border: 1px solid #564018;
    padding: 6px 12px; border-radius: 3px; font-family: inherit;
    font-size: 12px; cursor: pointer; display: block;
    user-select: none;
  }
  #btn-show-calbar:hover { background: #2a1c10; }
  #calbar select, #calbar input[type=number] {
    background: #1a1a1a; color: #e0e0e0; border: 1px solid #333;
    padding: 6px 10px; font-size: 14px; font-family: inherit;
  }
  #calbar .preset-btn { padding: 6px 14px; font-size: 13px; }
  #calbar .tl-label { font-size: 11px; color: #888; letter-spacing: 0.05em; }
  #calbar .tl-val { font-size: 13px; color: #c9a247; min-width: 70px; }
  #calbar .cal-info {
    color: #c9a247; font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 500;
    padding: 0 8px; min-width: 320px;
  }
  #calbar input[type=range] { flex: 0 0 260px; }

  /* Main grid */
  #main {
    flex: 1; display: grid; grid-template-columns: 280px 1fr 320px;
    min-height: 0;
    transition: grid-template-columns 0.25s ease;
  }
  #main.hide-left  { grid-template-columns: 0 1fr 320px; }
  #main.hide-right { grid-template-columns: 280px 1fr 0; }
  #main.hide-left.hide-right { grid-template-columns: 0 1fr 0; }
  #main.hide-left  #panel-left,
  #main.hide-right #panel-right { padding: 0; border-width: 0; visibility: hidden; }
  #panel-left, #panel-right {
    background: #121212; overflow-y: auto; overflow-x: hidden;
    padding: 14px; border: solid #2a2a2a; border-width: 0;
  }
  #panel-left { border-right-width: 1px; }
  #panel-right { border-left-width: 1px; }
  #panel-left::-webkit-scrollbar, #panel-right::-webkit-scrollbar { width: 8px; }
  #panel-left::-webkit-scrollbar-track, #panel-right::-webkit-scrollbar-track { background: #0a0a0a; }
  #panel-left::-webkit-scrollbar-thumb, #panel-right::-webkit-scrollbar-thumb {
    background: #3a3a3a; border-radius: 4px;
  }

  /* Panels */
  .panel-section {
    margin-bottom: 18px; padding-bottom: 14px;
    border-bottom: 1px solid #1f1f1f;
  }
  .panel-section:last-child { border-bottom: none; }
  .panel-section h2 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: #6b7a99; margin-bottom: 10px; font-weight: 600;
  }
  .panel-section h3 {
    font-size: 11px; color: #c9a247; margin: 8px 0 6px;
    font-weight: 500;
  }
  .ctrl, .layer-toggle {
    display: flex; align-items: center; padding: 5px 0; cursor: pointer;
    font-size: 12px; user-select: none;
  }
  .ctrl input[type=checkbox], .layer-toggle input { margin-right: 8px; }
  .ctrl:hover, .layer-toggle:hover { color: #fff; }
  .layer-color {
    width: 10px; height: 10px; border-radius: 50%;
    margin-right: 8px; flex-shrink: 0;
  }

  /* Search */
  #searchbox {
    width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a;
    color: #e0e0e0; padding: 7px 10px; border-radius: 4px; font-size: 12px;
  }
  #searchbox:focus { outline: none; border-color: #c9a247; }
  #search-results {
    margin-top: 8px; max-height: 200px; overflow-y: auto;
  }
  .search-hit {
    padding: 6px 8px; background: #1a1a1a; margin-bottom: 4px;
    border-radius: 3px; font-size: 11px; cursor: pointer;
  }
  .search-hit:hover { background: #2a2a2a; }
  .search-hit .hit-name { color: #fff; }
  .search-hit .hit-meta { color: #888; font-size: 10px; }

  /* Stats / facts */
  .stat-row {
    display: flex; justify-content: space-between; gap: 10px;
    padding: 3px 0; font-size: 11px;
  }
  .stat-row .k { color: #888; }
  .stat-row .v {
    color: #e0e0e0;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .stat-row .v.gold { color: #c9a247; }
  .stat-row .v.green { color: #6fcf6f; }
  .stat-row .v.red { color: #e07a7a; }

  /* Canvas */
  #canvas-wrap {
    position: relative; background: #050505; min-height: 0; overflow: hidden;
    container-type: size;
  }
  canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  canvas:active { cursor: grabbing; }
  #norge-surface-map,
  #norge-leaflet-map {
    position: absolute;
    left: var(--norge-map-left, 50%);
    top: var(--norge-map-top, 50%);
    width: var(--norge-map-size, min(82cqw, 82cqh));
    height: var(--norge-map-size, min(82cqw, 82cqh));
    display: none;
    background: transparent;
    z-index: 1;
    transform:
      translate(-50%, -50%)
      translate(var(--norge-map-x, 0px), var(--norge-map-y, 0px))
      scale(var(--norge-map-scale, 1))
      scaleY(var(--norge-map-flip-y, 1))
      rotate(var(--norge-map-rotation, 0deg));
    transform-origin: center center;
  }
  #norge-surface-map {
    pointer-events: auto;
    cursor: grab;
  }
  #norge-surface-map.dragging {
    cursor: grabbing;
  }
  #norge-surface-map img {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
  }
  .norge-surface-raster {
    opacity: 0;
    transition: opacity 120ms ease;
    z-index: 1;
  }
  .norge-surface-raster.active {
    opacity: var(--norge-raster-opacity, 1);
  }
  #norge-surface-detail-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    z-index: 2;
    display: none;
  }
  #norge-screen-detail-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
    display: none;
    opacity: 0.52;
  }
  #norge-clean-detail-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 4;
    display: none;
    opacity: 0.52;
  }
  #norge-leaflet-style-detail-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 5;
    display: none;
    opacity: 0.52;
  }
  .norge-leaflet-style-status {
    position: absolute;
    left: 8px;
    bottom: 8px;
    max-width: min(760px, calc(100% - 16px));
    padding: 3px 6px;
    border: 1px solid rgba(255, 214, 107, 0.35);
    background: rgba(0, 0, 0, 0.72);
    color: #ffd66b;
    font-size: 10px;
    line-height: 1.2;
    letter-spacing: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
    z-index: 1;
  }
  .norge-leaflet-style-pixelflate {
    position: absolute;
    left: 0;
    top: 0;
    transform-origin: 0 0;
    pointer-events: none;
  }
  .norge-leaflet-style-tile {
    position: absolute;
    object-fit: fill;
    transform-origin: top left;
    image-rendering: auto;
    opacity: 1;
    backface-visibility: hidden;
    box-sizing: border-box;
    user-select: none;
    pointer-events: none;
  }
  .norge-leaflet-style-tile.retiring {
    opacity: 0.65;
  }
  .norge-clean-pixelflate {
    position: absolute;
    left: 0;
    top: 0;
    transform-origin: 0 0;
    pointer-events: none;
    opacity: 1;
    outline: none;
    --tile-bleed: 1.0px;
    --pane-brightness: 1;
    --pane-contrast: 1;
    --pane-saturate: 1;
    filter:
      brightness(var(--pane-brightness, 1))
      contrast(var(--pane-contrast, 1))
      saturate(var(--pane-saturate, 1));
  }
  .norge-clean-pixelflate[data-anchor-mode="iceland"] {
    --pane-brightness: 1.05;
    --pane-contrast: 1.03;
    --pane-saturate: 1.05;
  }
  .norge-clean-diagnostics {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 8;
  }
  .norge-clean-anchor {
    position: absolute;
    width: 9px;
    height: 9px;
    margin-left: -4.5px;
    margin-top: -4.5px;
    border-radius: 999px;
    box-sizing: border-box;
    cursor: pointer;
    pointer-events: auto;
  }
  .norge-clean-anchor.src {
    background: rgba(0, 255, 204, 0.9);
    border: 2px solid #001b18;
  }
  .norge-clean-anchor.underlay {
    background: rgba(255, 80, 220, 0.92);
    border: 2px solid #210018;
  }
  .norge-clean-anchor.dst {
    background: rgba(255, 48, 48, 0.96);
    border: 2px solid #120000;
    box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.35);
  }
  .norge-anchor-underlay {
    opacity: 0;
    pointer-events: none;
  }
  .norge-clean-residual-line {
    position: absolute;
    height: 1px;
    background: rgba(255, 255, 255, 0.85);
    transform-origin: 0 50%;
  }
  .norge-clean-map-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 9;
  }
  .norge-clean-map-overlay .clean-city {
    fill: #ffd76b;
    fill-opacity: 0.95;
    stroke: #050505;
    stroke-width: 2;
    vector-effect: non-scaling-stroke;
  }
  .norge-clean-map-overlay .clean-control {
    fill: #ff50dc;
    fill-opacity: 0.98;
    stroke: #050505;
    stroke-width: 2;
    vector-effect: non-scaling-stroke;
    cursor: pointer;
    pointer-events: auto;
    display: none;
  }
  .norge-clean-map-overlay .clean-arc {
    fill: none;
    stroke: #ffef6e;
    stroke-width: 3;
    stroke-opacity: 0.92;
    vector-effect: non-scaling-stroke;
  }
  .norge-detail-tile {
    position: absolute;
    object-fit: fill;
    transform-origin: top left;
    image-rendering: auto;
    opacity: 1;
    backface-visibility: hidden;
    box-sizing: border-box;
    user-select: none;
  }
  .norge-clean-pixelflate .norge-detail-tile {
    margin-left: calc(var(--tile-bleed) * -0.5);
    margin-top: calc(var(--tile-bleed) * -0.5);
  }
  .norge-detail-tile.overlay {
    opacity: 0.82;
    mix-blend-mode: normal;
  }
  #norge-surface-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 3;
  }
  .norge-surface-line {
    fill: none;
    vector-effect: non-scaling-stroke;
  }
  .norge-surface-marker {
    vector-effect: non-scaling-stroke;
    cursor: pointer;
    pointer-events: auto;
    transform-box: fill-box;
    transform-origin: center;
    transform: scale(var(--norge-surface-marker-scale, 1));
  }
  .norge-surface-marker.norge-anchor-underlay {
    opacity: 0;
    pointer-events: none;
  }
  .norge-surface-label {
    font: 34px 'JetBrains Mono', ui-monospace, monospace;
    fill: #ffd76b;
    paint-order: stroke;
    stroke: #050505;
    stroke-width: 6px;
    pointer-events: none;
  }
  #norge-leaflet-map.leaflet-container {
    background: transparent;
  }
  #canvas-wrap.norge-active #cv {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  #canvas-wrap.norge-active #tooltip {
    display: none !important;
  }
  #canvas-wrap.norge-active #norge-surface-map,
  #canvas-wrap.norge-active #norge-leaflet-map {
    display: block;
  }
  #canvas-wrap.norge-active #norge-screen-detail-layer {
    display: block;
  }
  #canvas-wrap.norge-active #norge-clean-detail-layer {
    display: block;
  }
  #canvas-wrap.norge-active #zoom-indicator {
    z-index: 3;
  }
  #norge-controls {
    display: none;
    margin: 6px 0 8px 20px;
    padding: 8px;
    border: 1px solid #2a2a2a;
    background: #101010;
  }
  #norge-controls.open { display: block; }
  #norge-controls .norge-section { margin-top: 10px; }
  #norge-controls .norge-section:first-child { margin-top: 0; }
  #norge-controls .norge-title {
    color: #9a8a58;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 5px;
  }
  #norge-controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #ccc;
    font-size: 11px;
    margin: 4px 0;
  }
  #norge-controls button {
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    color: #d4af37;
    font-size: 10px;
    padding: 4px 7px;
    margin: 2px 4px 4px 0;
    cursor: pointer;
  }
  #norge-controls button:hover { border-color: #d4af37; }
  #norge-controls .norge-range-row {
    display: grid;
    grid-template-columns: 42px 1fr 42px;
    align-items: center;
    gap: 6px;
    color: #888;
    font-size: 10px;
    margin: 5px 0;
  }
  #norge-controls .norge-range-row input { min-width: 0; }
  #norge-controls .norge-range-row span:last-child {
    color: #d4af37;
    font-family: ui-monospace, monospace;
    text-align: right;
  }
  .norge-measure-box {
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    color: #ccc;
    font-family: ui-monospace, monospace;
    font-size: 10px;
    line-height: 1.45;
    padding: 6px;
    white-space: pre-wrap;
  }
  .norge-info-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: #888;
    font-size: 10px;
    margin: 2px 0;
  }
  .norge-info-row span:last-child {
    color: #ddd;
    font-family: ui-monospace, monospace;
  }
  #norge-city-list {
    max-height: 170px;
    overflow: auto;
    border-top: 1px solid #242424;
    margin-top: 4px;
  }
  .norge-city-item {
    padding: 5px 0;
    border-bottom: 1px solid #242424;
    cursor: pointer;
    font-size: 11px;
  }
  .norge-city-item:hover { color: #fff; }
  .norge-city-coord {
    color: #d4af37;
    font-family: ui-monospace, monospace;
    font-size: 10px;
  }

  /* View menu (dropdown) */
  .menu-wrap { position: relative; }
  .menu-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; color: #ccc;
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
    height: 30px; white-space: nowrap;
  }
  .menu-btn:hover { background: #2a2a2a; color: #fff; }
  .menu-btn.active { background: #c9a247; color: #000; border-color: #c9a247; }
  .menu-panel {
    position: absolute; top: 38px; right: 0; min-width: 280px;
    background: rgba(20,20,20,0.97); border: 1px solid #2a2a2a;
    border-radius: 6px; padding: 10px 12px; z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    font-family: ui-monospace, monospace; font-size: 10px; color: #aaa;
    display: none;
  }
  .menu-panel.open { display: block; }
  .menu-panel .menu-section { margin-bottom: 10px; }
  .menu-panel .menu-section:last-child { margin-bottom: 0; }
  .menu-panel .menu-h {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
